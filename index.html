<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Marvel Movie Finder</title>

<link rel="stylesheet" href="styles/styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">

<span class="navbar-brand">Marvel Movie Finder</span>

<div>
<a href="pages/session.html" class="btn btn-light btn-sm">Session</a>
<button id="logoutBtn" class="btn btn-danger btn-sm">Logout</button>
</div>

</div>
</nav>

<div class="container mt-4">

<h1>Marvel Movies</h1>

<div class="row">

<div class="col-md-4" id="loginSection">

<input id="username" class="form-control mb-2" placeholder="Username">
<input id="password" type="password" class="form-control mb-2" placeholder="Password">

<button id="loginBtn" class="btn btn-primary w-100 mb-3">Login</button>

<p id="sessionInfo"></p>

</div>

<div class="col-md-8">

<input id="searchInput" class="form-control mb-2" placeholder="Search Marvel movies">

<select id="filterSelect" class="form-select mb-2">
<option value="all">All Movies</option>
<option value="Avengers">Avengers</option>
<option value="Spider-Man">Spider-Man</option>
<option value="Guardians">Guardians</option>
<option value="Other">Other</option>
</select>

<button id="sortBtn" class="btn btn-secondary mb-3">Sort A-Z</button>

</div>

</div>

<div id="movieContainer" class="row"></div>

</div>

<footer class="bg-dark text-center text-white p-3 mt-4">
<p>Marvel Movie Finder © 2026</p>
</footer>

<script src="scripts/app.js"></script>

</body>
</html>
</body>
</html>
