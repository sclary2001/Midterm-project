<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Marvel Movie Finder</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Your CSS -->
  <link rel="stylesheet" href="styles/styles.css">
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <h1 class="text-center my-3">Marvel Movie Finder</h1>

  <!-- LOGIN SECTION -->
  <div id="authSection" class="text-center mb-4">

    <input type="text" id="username" placeholder="Username" class="form-control d-inline w-auto">
    <input type="password" id="password" placeholder="Password" class="form-control d-inline w-auto">

    <button class="btn btn-primary" onclick="login()">Login</button>
    <button class="btn btn-danger" onclick="logout()">Logout</button>

    <p id="loginStatus" class="mt-2">Not logged in</p>

  </div>

  <!-- SEARCH + FILTER -->
  <div class="row mb-3">

    <div class="col-md-6">
      <input id="searchInput" class="form-control" placeholder="Search movies">
    </div>

    <div class="col-md-6">
      <select id="filterSelect" class="form-select">
        <option value="all">All Categories</option>
        <option value="Avengers">Avengers</option>
        <option value="Guardians">Guardians</option>
        <option value="Spider-Man">Spider-Man</option>
        <option value="Other">Other</option>
      </select>
    </div>

  </div>

  <!-- MOVIE DISPLAY AREA -->
  <div id="movieContainer" class="row">
    <!-- Movies will be injected here -->
  </div>

</div>

<!-- SCRIPT FILE -->
<script src="scripts/app.js"></script>

</body>
</html>
